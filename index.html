<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TSI Lab | Time Series Intelligence</title>
    
    <meta name="description" content="Pusan National University's Time Series Intelligence (TSI) Lab, led by Prof. Yoontae Hwang. We study AI in Finance, AI in Market, and Foundation Models for financial time series.">
    <meta name="google-site-verification" content="zUXBoVvnNd_fLXqOcAivCHm6VXk-5CU29wTHpFs13Ow" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --tsi-ink: #172033;
            --tsi-navy: #243044;
            --tsi-muted: #5e6676;
            --tsi-stone: #746b5d;
            --tsi-accent: #8a6f3d;
            --tsi-paper: #f4f1e8;
            --tsi-panel: #fffdf8;
            --tsi-panel-muted: #eceff1;
            --tsi-line: #d8d0c0;
            --tsi-line-soft: #e9e2d5;
            --tsi-link: #1f4e5f;
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--tsi-paper);
            color: var(--tsi-ink);
            font-size: 14px;
        }
        ::selection { background: #d7c8a3; }
        a { text-underline-offset: 3px; }
        .tsi-rule { border-top: 1px solid var(--tsi-line); }
        .tsi-section { border-top: 1px solid var(--tsi-line); padding-top: 14px; }
        .tsi-section:first-child { border-top: 0; padding-top: 0; }
        .tsi-panel { border: 1px solid var(--tsi-line); background: var(--tsi-panel); }
        .tsi-panel-muted { border: 1px solid var(--tsi-line); background: var(--tsi-panel-muted); }
        .tsi-row { border-bottom: 1px solid var(--tsi-line-soft); }
        .tsi-row:last-child { border-bottom: 0; }
        .tsi-link { color: var(--tsi-link); font-weight: 650; text-decoration: underline; text-decoration-color: #b7aa91; }
        .tsi-link:hover { color: var(--tsi-ink); text-decoration-color: var(--tsi-link); }
        .tsi-kicker { color: var(--tsi-accent); font-size: 11px; font-weight: 800; letter-spacing: 0.16em; text-transform: uppercase; }
        .tsi-heading { color: var(--tsi-ink); font-weight: 800; letter-spacing: -0.025em; }
        .tsi-muted { color: var(--tsi-muted); }
        .tsi-keyword-chain { color: #404958; }
        .tsi-keyword-term { font-weight: 650; }
        .tsi-keyword-divider { color: #a49373; font-weight: 500; }
        .tsi-mini-link { color: var(--tsi-link); font-size: 12px; font-weight: 750; text-decoration: underline; text-decoration-color: #b7aa91; text-underline-offset: 3px; }
        .tsi-mini-link:hover { color: var(--tsi-ink); text-decoration-color: var(--tsi-link); }
        input::placeholder { color: #858c98; }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel" src="js/data.js"></script>
    
    <script type="text/babel" src="js/tabs/Home.js"></script>
    <script type="text/babel" src="js/tabs/Members.js"></script>
    <script type="text/babel" src="js/tabs/Publications.js"></script>
    <script type="text/babel" src="js/tabs/Teaching.js"></script>
    <script type="text/babel" src="js/tabs/Project.js"></script>
    <script type="text/babel" src="js/tabs/ForStudents.js"></script>
    <script type="text/babel" src="js/tabs/Vacant.js"></script>
    
    <script type="text/babel" src="js/main.js"></script>
</body>
</html>
